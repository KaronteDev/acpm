version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: acpm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: acpm_db
      POSTGRES_USER: acpm_user
      POSTGRES_PASSWORD: acpm_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - acpm_postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acpm_user -d acpm_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: acpm_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - acpm_redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  acpm_postgres_data:
  acpm_redis_data:
